<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    .api{
        height: 100vh;
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
    }

    .api > div {
        width: 200px;
        height: 250px;

        background-color: aquamarine;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        gap: 5px;

        border: 2px solid black;
        border-radius: 25px;
    }

    .api > div > h1 {
        font-size: 15px;
        text-align: center;
    }

    .api > div > img {
        width: 150px;
        height: 100px;
    }

    .api > div > p {
        font-size: 12px;
    }
  
</style>


<body>
    

    <div class="api"></div>

    <script src="./Api.js"></script>
</body>
</html>
